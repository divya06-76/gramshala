{% extends "base.html" %}
{% block title %}Add Teacher{% endblock %}
{% block page_title %}Add Teacher{% endblock %}
{% block nav_teachers %}active{% endblock %}
{% block content %}
<div class="breadcrumb"><a href="/">Home</a> › <a href="/teachers/">Teachers</a> › Add Teacher</div>
<div class="card" style="max-width:680px;">
  <div class="card-header"><span class="card-title">➕ New Teacher Registration</span></div>
  <form method="post">
    {% csrf_token %}
    <div class="form-grid">
      <div class="form-group">
        <label>Full Name *</label>
        <input type="text" name="name" required placeholder="e.g. Ramesh Kumar Sharma">
      </div>
      <div class="form-group">
        <label>Employee ID *</label>
        <input type="text" name="employee_id" required placeholder="e.g. EMP001">
      </div>
      <div class="form-group">
        <label>Phone Number *</label>
        <input type="tel" name="phone" required placeholder="10-digit mobile number">
      </div>
      <div class="form-group">
        <label>Subject *</label>
        <select name="subject" required>
          <option value="">-- Select Subject --</option>
          <option>Hindi</option><option>English</option><option>Math</option>
          <option>Science</option><option>Social</option><option>Computer</option>
          <option>Art</option><option>PT</option>
        </select>
      </div>
      <div class="form-group">
        <label>Qualification</label>
        <input type="text" name="qualification" placeholder="e.g. B.Ed, M.A." value="B.Ed">
      </div>
      <div class="form-group">
        <label>Joining Date *</label>
        <input type="date" name="joining_date" required>
      </div>
    </div>
    <div style="margin-top:20px; display:flex; gap:12px;">
      <button type="submit" class="btn btn-primary">💾 Save Teacher</button>
      <a href="/teachers/" class="btn btn-secondary">Cancel</a>
    </div>
  </form>
</div>
{% endblock %}
