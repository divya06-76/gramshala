{% extends "base.html" %}
{% block title %}Enroll Student{% endblock %}
{% block page_title %}Enroll Student{% endblock %}
{% block nav_students %}active{% endblock %}
{% block content %}
<div class="breadcrumb"><a href="/">Home</a> › <a href="/students/">Students</a> › Enroll</div>
<div class="card" style="max-width:720px;">
  <div class="card-header"><span class="card-title">📝 New Student Enrollment</span></div>
  <form method="post">
    {% csrf_token %}
    <div class="form-grid">
      <div class="form-group">
        <label>Student Full Name *</label>
        <input type="text" name="name" required placeholder="e.g. Priya Kumari Yadav">
      </div>
      <div class="form-group">
        <label>Roll Number *</label>
        <input type="text" name="roll_number" required placeholder="e.g. 2024-001">
      </div>
      <div class="form-group">
        <label>Class *</label>
        <select name="student_class" required>
          <option value="">-- Select Class --</option>
          {% for i in "12345678" %}<option value="{{ i }}">Class {{ i }}</option>{% endfor %}
        </select>
      </div>
      <div class="form-group">
        <label>Section</label>
        <select name="section">
          <option value="A">A</option><option value="B">B</option><option value="C">C</option>
        </select>
      </div>
      <div class="form-group">
        <label>Date of Birth *</label>
        <input type="date" name="date_of_birth" required>
      </div>
      <div class="form-group">
        <label>Category</label>
        <select name="category">
          <option>General</option><option>OBC</option><option>SC</option><option>ST</option>
        </select>
      </div>
      <div class="form-group">
        <label>Guardian Name *</label>
        <input type="text" name="guardian_name" required placeholder="Father/Mother name">
      </div>
      <div class="form-group">
        <label>Guardian Phone *</label>
        <input type="tel" name="guardian_phone" required placeholder="10-digit mobile">
      </div>
      <div class="form-group">
        <label>Aadhar Number (optional)</label>
        <input type="text" name="aadhar_number" placeholder="12-digit Aadhar number" maxlength="12">
      </div>
      <div class="form-group" style="grid-column: span 2">
        <label>Address *</label>
        <textarea name="address" required rows="2" placeholder="Village, Post, District, State"></textarea>
      </div>
    </div>
    <div style="margin-top:20px; display:flex; gap:12px;">
      <button type="submit" class="btn btn-primary">💾 Enroll Student</button>
      <a href="/students/" class="btn btn-secondary">Cancel</a>
    </div>
  </form>
</div>
{% endblock %}
